name: Build and Publish

# Builds the sample-agent image and pushes to Docker Hub
# (docker.io/calliopeai/astrolift-sample-agent) tagged `main-<sha7>` +
# `latest`. Mirrors astrolift-agents/.github/workflows/build-images.yml:
# docker/login-action@v3 with the org-level secrets DOCKERHUB_USERNAME /
# DOCKERHUB_TOKEN (visibility=ALL — inherited by every calliopeai repo).
# Deterministic main-<sha7> tags are what deploys pin (campaign blocker
# B3 — no bare `latest` for deploy).
on:
  push:
    branches: [main]
  workflow_dispatch:


env:
  REGISTRY_DOCKERHUB: docker.io
  NAMESPACE: calliopeai
  IMAGE: astrolift-sample-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          echo "sha=main-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "push=true" >>"$GITHUB_OUTPUT"
          else
            echo "push=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            --build-arg "GIT_SHA=${GITHUB_SHA::7}" \
            --build-arg "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg "IMAGE_REF=${REGISTRY_DOCKERHUB}/${NAMESPACE}/${IMAGE}:${{ steps.tags.outputs.sha }}" \
            -t "${REGISTRY_DOCKERHUB}/${NAMESPACE}/${IMAGE}:${{ steps.tags.outputs.sha }}" \
            -t "${REGISTRY_DOCKERHUB}/${NAMESPACE}/${IMAGE}:latest" \
            .

      - name: Smoke test (Task-family run exits 0)
        run: |
          docker run --rm \
            -e ASTROLIFT_INPUT='{"hello":"world"}' \
            "${REGISTRY_DOCKERHUB}/${NAMESPACE}/${IMAGE}:${{ steps.tags.outputs.sha }}"

      - name: Push tags (Docker Hub)
        if: steps.tags.outputs.push == 'true'
        run: |
          for tag in "${{ steps.tags.outputs.sha }}" latest; do
            docker push "${REGISTRY_DOCKERHUB}/${NAMESPACE}/${IMAGE}:${tag}"
          done
